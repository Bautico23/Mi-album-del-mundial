<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Panini - Control de Figuritas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes focusPulse {
            0%   { transform: translate(-50%,-50%) scale(1.4); opacity: 1; }
            100% { transform: translate(-50%,-50%) scale(1);   opacity: 0; }
        }
        #focusRing {
            position: absolute;
            width: 60px; height: 60px;
            border: 2px solid #FBBF24;
            border-radius: 4px;
            pointer-events: none;
            display: none;
        }
        #focusRing.active { display: block; animation: focusPulse 0.7s ease-out forwards; }

        /* Selector de cámara */
        .cam-btn {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 6px; padding: 12px 10px; border-radius: 12px; border: 2px solid #374151;
            background: #1f2937; color: #d1d5db; cursor: pointer; transition: all 0.15s;
            min-width: 80px; flex: 1;
        }
        .cam-btn:active { transform: scale(0.96); }
        .cam-btn.selected { border-color: #3b82f6; background: #1d4ed8; color: #fff; }
        .cam-btn .cam-icon { font-size: 22px; }
        .cam-btn .cam-label { font-size: 11px; font-weight: 600; text-align: center; line-height: 1.2; }
        .cam-btn .cam-res { font-size: 10px; color: #9ca3af; margin-top: 2px; }
        .cam-btn.selected .cam-res { color: #bfdbfe; }
    </style>
</head>
<body class="text-gray-800 pb-20">

<header class="bg-blue-900 text-white sticky top-0 z-50 shadow-md">
    <div class="p-4 pb-2">
        <h1 class="text-xl font-bold text-center mb-3">Mi Álbum Panini</h1>
        <div class="relative flex gap-2">
            <div class="relative flex-1">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                    <i class="fa-solid fa-search text-gray-400"></i>
                </span>
                <input type="text" id="searchInput"
                    class="w-full py-2 pl-10 pr-4 rounded-lg text-black focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                    placeholder="Buscar por jugador, país o código...">
            </div>
            <button onclick="openScanner()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 rounded-lg shadow transition-colors flex items-center justify-center">
                <i class="fa-solid fa-camera"></i>
            </button>
        </div>
    </div>
    <div class="bg-blue-800 px-2 py-2.5 border-t border-blue-700">
        <div id="groupFilters" class="flex gap-2 overflow-x-auto hide-scrollbar px-2 snap-x"></div>
    </div>
    <div id="countryFiltersContainer" class="bg-slate-800 px-2 py-2 border-t border-slate-700 hidden">
        <div id="countryFilters" class="flex gap-2 overflow-x-auto hide-scrollbar px-2 snap-x"></div>
    </div>
</header>

<main class="p-4 max-w-2xl mx-auto">
    <div id="loadingSection" class="text-center py-10">
        <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-600 mb-3"></i>
        <p class="text-gray-600">Cargando base de datos...</p>
    </div>
    <div id="statsSection" class="hidden grid-cols-2 gap-4 mb-6">
        <div class="bg-white p-3 rounded-lg shadow-sm text-center">
            <p class="text-xs text-gray-500 uppercase font-bold">Completado</p>
            <p class="text-xl font-bold text-blue-600" id="progressCount">0 / 980</p>
        </div>
        <div class="bg-white p-3 rounded-lg shadow-sm text-center">
            <p class="text-xs text-gray-500 uppercase font-bold">Repetidas</p>
            <p class="text-xl font-bold text-orange-500" id="duplicatesCount">0</p>
        </div>
    </div>
    <div id="toastNotification" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50 text-sm font-medium"></div>
    <div id="cardsContainer" class="grid gap-3"></div>
</main>

<!-- MODAL ESCÁNER -->
<div id="scannerModal" class="fixed inset-0 bg-black z-[100] hidden flex-col">

    <!-- Barra superior -->
    <div class="p-4 flex justify-between items-center text-white bg-black/50 absolute top-0 w-full z-20">
        <button onclick="toggleFlash()" class="text-white text-2xl w-10 h-10 flex items-center justify-center bg-gray-800/60 rounded-full">
            <i id="flashIcon" class="fa-solid fa-bolt-slash"></i>
        </button>
        <div class="text-center">
            <h2 class="text-base font-bold leading-none">Escanear figurita</h2>
            <p id="zoomLabel" class="text-yellow-300 text-xs mt-0.5">Zoom: 1×</p>
        </div>
        <button onclick="closeScanner()" class="text-white text-2xl w-10 h-10 flex items-center justify-center bg-gray-800/60 rounded-full">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <!-- Área de cámara -->
    <div id="cameraArea" class="flex-1 relative bg-black flex items-center justify-center overflow-hidden">
        <video id="cameraFeed" autoplay playsinline muted class="object-cover w-full h-full"></video>
        <!-- Marco guía -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="relative w-64 h-80 border-2 border-yellow-400/70 rounded-lg shadow-[0_0_0_9999px_rgba(0,0,0,0.55)]">
                <div class="absolute top-0 left-0  w-5 h-5 border-t-4 border-l-4 border-yellow-400 rounded-tl"></div>
                <div class="absolute top-0 right-0 w-5 h-5 border-t-4 border-r-4 border-yellow-400 rounded-tr"></div>
                <div class="absolute bottom-0 left-0  w-5 h-5 border-b-4 border-l-4 border-yellow-400 rounded-bl"></div>
                <div class="absolute bottom-0 right-0 w-5 h-5 border-b-4 border-r-4 border-yellow-400 rounded-br"></div>
            </div>
        </div>
        <div id="focusRing"></div>
    </div>

    <!-- Selector de cámara -->
    <div id="cameraSelectorBar" class="bg-gray-900/95 px-4 pt-3 pb-2 z-20 border-t border-gray-700">
        <p class="text-gray-400 text-xs text-center mb-2 font-semibold uppercase tracking-wide">Seleccionar cámara</p>
        <div id="cameraButtons" class="flex gap-2 overflow-x-auto hide-scrollbar pb-1"></div>
    </div>

    <!-- Zoom -->
    <div class="bg-gray-900/90 px-4 pt-2 pb-1 z-20">
        <div class="flex items-center gap-3">
            <span class="text-gray-400 text-xs w-4">1×</span>
            <input type="range" id="zoomSlider" min="1" max="4" step="0.1" value="1"
                class="flex-1 h-1 appearance-none bg-gray-600 rounded-full outline-none">
            <span class="text-gray-400 text-xs w-4">4×</span>
        </div>
        <p class="text-gray-500 text-xs text-center mt-1">Desliza para acercar · Toca la imagen para enfocar</p>
    </div>

    <!-- Barra inferior -->
    <div class="bg-gray-900 px-6 py-5 flex flex-col items-center z-20">
        <p id="scanStatus" class="text-blue-300 mb-4 text-sm font-medium text-center min-h-5"></p>
        <button id="captureBtn" onclick="captureForPreview()"
            class="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center border-4 border-white shadow-lg active:scale-95 transition-transform">
            <i class="fa-solid fa-camera text-white text-xl"></i>
        </button>
    </div>

    <!-- Preview -->
    <div id="previewContainer" class="hidden absolute inset-0 bg-black/85 flex flex-col items-center justify-center z-30 p-6">
        <p class="text-white font-semibold mb-3">¿La imagen se ve nítida?</p>
        <img id="previewImg" class="rounded-lg border-2 border-yellow-400 max-h-64 mb-5 object-contain" />
        <div class="flex gap-4">
            <button onclick="retryCapture()" class="bg-gray-700 text-white px-6 py-2.5 rounded-full font-bold text-sm">
                <i class="fa-solid fa-rotate-left mr-1"></i> Reintentar
            </button>
            <button onclick="confirmScan()" class="bg-green-600 text-white px-6 py-2.5 rounded-full font-bold text-sm">
                <i class="fa-solid fa-check mr-1"></i> Analizar
            </button>
        </div>
    </div>
</div>

<script>
// ─── Estado global ────────────────────────────────────────────────────────────
const STORAGE_KEY = 'panini_album_data';
let albumData = [];
let uniqueGroups = [], uniqueCountries = [];
let currentGroupFilter = 'Todos', currentCountryFilter = 'Todos';

let mediaStream    = null;
let isFlashOn      = false;
let currentZoom    = 1;
let useNativeZoom  = false;
let pendingCanvas  = null;

// Lista de cámaras disponibles
let availableCameras = [];   // [{ deviceId, label, facing, icon, res }]
let selectedCameraId = null;

// ─── DOM refs ────────────────────────────────────────────────────────────────
const loadingSection     = document.getElementById('loadingSection');
const statsSection       = document.getElementById('statsSection');
const cardsContainer     = document.getElementById('cardsContainer');
const searchInput        = document.getElementById('searchInput');
const groupFiltersEl     = document.getElementById('groupFilters');
const countryFiltersWrap = document.getElementById('countryFiltersContainer');
const countryFiltersEl   = document.getElementById('countryFilters');
const toastEl            = document.getElementById('toastNotification');
const scannerModal       = document.getElementById('scannerModal');
const cameraFeed         = document.getElementById('cameraFeed');
const cameraArea         = document.getElementById('cameraArea');
const scanStatus         = document.getElementById('scanStatus');
const captureBtn         = document.getElementById('captureBtn');
const flashIcon          = document.getElementById('flashIcon');
const focusRing          = document.getElementById('focusRing');
const previewContainer   = document.getElementById('previewContainer');
const previewImg         = document.getElementById('previewImg');
const zoomSlider         = document.getElementById('zoomSlider');
const zoomLabel          = document.getElementById('zoomLabel');
const cameraButtons      = document.getElementById('cameraButtons');

// ─── Utilidades ───────────────────────────────────────────────────────────────
function quitarAcentos(t) {
    return t ? t.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase() : '';
}
function showToast(msg, ok=true) {
    toastEl.innerText = msg;
    toastEl.className = `fixed bottom-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 z-50 text-sm font-medium ${ok?'bg-green-600':'bg-red-600'} text-white`;
    toastEl.style.opacity = '1';
    setTimeout(() => toastEl.style.opacity = '0', 3000);
}
function setStatus(text, color='blue') {
    const map = { blue:'text-blue-300', yellow:'text-yellow-400', green:'text-green-400', red:'text-red-400', orange:'text-orange-400' };
    scanStatus.innerText = text;
    scanStatus.className = `${map[color]||'text-blue-300'} mb-4 text-sm font-medium text-center min-h-5`;
}

// ─── Datos ────────────────────────────────────────────────────────────────────
async function init() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) { albumData = JSON.parse(stored); extractGroups(); showApp(); return; }
    try {
        const r = await fetch('data.csv');
        if (!r.ok) throw new Error();
        Papa.parse(await r.text(), {
            header: true, skipEmptyLines: true,
            complete: ({ data }) => {
                albumData = data.map(row => ({
                    codigo:       row['Código'],
                    pais:         row['Categoría / Pais'],
                    descripcion:  row['Descripción'],
                    enInventario: row['En Inventario']==='TRUE'||row['En Inventario']==='True'||false,
                    repetidas:    parseInt(row['Repetidas'])||0,
                    grupo:        row['Grupos']||'Otros'
                }));
                extractGroups(); saveData(); showApp();
            }
        });
    } catch { loadingSection.innerHTML = `<p class="text-red-600 font-bold">Error al leer data.csv</p>`; }
}
function extractGroups() {
    uniqueGroups = ['Todos', ...new Set(albumData.map(i=>i.grupo).filter(Boolean))];
}
function updateCountryList() {
    const src = currentGroupFilter!=='Todos' ? albumData.filter(i=>i.grupo===currentGroupFilter) : albumData;
    uniqueCountries = ['Todos', ...new Set(src.map(i=>i.pais).filter(Boolean))];
    if (!uniqueCountries.includes(currentCountryFilter)) currentCountryFilter='Todos';
}
function saveData()  { localStorage.setItem(STORAGE_KEY, JSON.stringify(albumData)); updateStats(); }
function updateStats() {
    const got = albumData.filter(c=>c.enInventario).length;
    const rep = albumData.reduce((s,c)=>s+c.repetidas,0);
    document.getElementById('progressCount').innerText  = `${got} / ${albumData.length}`;
    document.getElementById('duplicatesCount').innerText = rep;
}
function showApp() {
    loadingSection.classList.add('hidden');
    statsSection.classList.remove('hidden');
    statsSection.classList.add('grid');
    renderGroupFilters(); updateCountryList(); renderCountryFilters(); filterCards(); updateStats();
}

// ─── Filtros y tarjetas ────────────────────────────────────────────────────────
function renderGroupFilters() {
    groupFiltersEl.innerHTML='';
    uniqueGroups.forEach(g => {
        const b=document.createElement('button');
        b.className=`snap-start whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium transition-colors border-2 ${currentGroupFilter===g?'bg-blue-100 text-blue-900 border-blue-200 shadow-sm':'bg-transparent text-blue-100 border-transparent hover:bg-blue-700'}`;
        b.innerText=g;
        b.onclick=()=>{currentGroupFilter=g;currentCountryFilter='Todos';renderGroupFilters();updateCountryList();renderCountryFilters();filterCards();};
        groupFiltersEl.appendChild(b);
    });
}
function renderCountryFilters() {
    countryFiltersEl.innerHTML='';
    if (currentGroupFilter==='Todos'||uniqueCountries.length<=2){countryFiltersWrap.classList.add('hidden');return;}
    countryFiltersWrap.classList.remove('hidden');
    uniqueCountries.forEach(p=>{
        const b=document.createElement('button');
        b.className=`snap-start whitespace-nowrap px-3 py-1 rounded-full text-xs font-semibold transition-colors border ${currentCountryFilter===p?'bg-orange-500 text-white border-orange-400 shadow-sm':'bg-transparent text-slate-300 border-transparent hover:bg-slate-700'}`;
        b.innerText=p;
        b.onclick=()=>{currentCountryFilter=p;renderCountryFilters();filterCards();};
        countryFiltersEl.appendChild(b);
    });
}
function filterCards() {
    const term=quitarAcentos(searchInput.value);
    const f=albumData.filter(c=>{
        const d=quitarAcentos(c.descripcion),cod=quitarAcentos(c.codigo),pt=quitarAcentos(c.pais);
        return (d.includes(term)||cod.includes(term)||pt.includes(term))
            &&(currentGroupFilter==='Todos'||c.grupo===currentGroupFilter)
            &&(currentCountryFilter==='Todos'||c.pais===currentCountryFilter);
    });
    renderCards(f);
}
searchInput.addEventListener('input',filterCards);
function renderCards(data) {
    cardsContainer.innerHTML='';
    data.slice(0,100).forEach(card=>{
        const ri=albumData.findIndex(c=>c.codigo===card.codigo);
        const el=document.createElement('div');
        el.className=`p-4 rounded-lg border-2 shadow-sm flex items-center justify-between transition-colors ${card.enInventario?'bg-blue-50 border-blue-300':'bg-white border-gray-200'}`;
        el.innerHTML=`
            <div class="flex-1 cursor-pointer" onclick="toggleInventario(${ri})">
                <div class="flex items-center gap-2">
                    <span class="font-bold text-lg ${card.enInventario?'text-blue-700':'text-gray-700'}">${card.codigo}</span>
                    <span class="text-xs px-2 py-1 bg-gray-200 text-gray-700 rounded-full font-semibold">${card.pais}</span>
                </div>
                <p class="text-sm text-gray-600 mt-1 font-medium">${card.descripcion}</p>
            </div>
            <div class="flex items-center gap-3 ml-2">
                <button onclick="toggleInventario(${ri})" class="w-8 h-8 rounded-full flex items-center justify-center transition-colors ${card.enInventario?'bg-blue-500 text-white shadow-md':'bg-gray-200 text-gray-400'}">
                    <i class="fa-solid fa-check"></i>
                </button>
                <div class="flex items-center bg-gray-100 rounded-lg p-1 border border-gray-200">
                    <button onclick="updateRepetidas(${ri},-1)" class="w-7 h-7 text-gray-600 hover:bg-gray-200 rounded flex items-center justify-center"><i class="fa-solid fa-minus text-xs"></i></button>
                    <span class="w-6 text-center font-bold text-sm text-orange-600">${card.repetidas}</span>
                    <button onclick="updateRepetidas(${ri},1)" class="w-7 h-7 text-gray-600 hover:bg-gray-200 rounded flex items-center justify-center"><i class="fa-solid fa-plus text-xs"></i></button>
                </div>
            </div>`;
        cardsContainer.appendChild(el);
    });
}
window.toggleInventario = i => {
    albumData[i].enInventario=!albumData[i].enInventario;
    if(!albumData[i].enInventario) albumData[i].repetidas=0;
    saveData(); filterCards();
};
window.updateRepetidas = (i,d) => {
    let v=albumData[i].repetidas+d; if(v<0)v=0;
    if(v>0&&!albumData[i].enInventario) albumData[i].enInventario=true;
    albumData[i].repetidas=v; saveData(); filterCards();
};

// ─── CÁMARA ───────────────────────────────────────────────────────────────────

// Intenta detectar qué tipo de lente es cada cámara por su etiqueta
function guessCameraInfo(label, index, facingMode) {
    const l = label.toLowerCase();
    // Iconos y nombres según palabras clave del label
    if (l.includes('ultra') || l.includes('wide') || l.includes('gran angular') || l.includes('0.5'))
        return { icon: 'fa-expand', name: 'Ultra gran angular' };
    if (l.includes('tele') || l.includes('zoom') || l.includes('5x') || l.includes('3x') || l.includes('2x'))
        return { icon: 'fa-crosshairs', name: `Teleobjetivo` };
    if (l.includes('front') || l.includes('frontal') || l.includes('selfie') || facingMode==='user')
        return { icon: 'fa-user', name: 'Frontal' };
    if (l.includes('depth') || l.includes('profundidad'))
        return { icon: 'fa-layer-group', name: 'Profundidad' };
    if (l.includes('macro'))
        return { icon: 'fa-magnifying-glass', name: 'Macro' };
    // Cámara trasera genérica: la primera suele ser la principal
    if (facingMode === 'environment' || l.includes('back') || l.includes('trasera') || l.includes('rear'))
        return { icon: 'fa-camera', name: index === 0 ? 'Principal' : `Trasera ${index+1}` };
    return { icon: 'fa-camera', name: label || `Cámara ${index+1}` };
}

// Enumera las cámaras de vídeo disponibles
async function enumerateCameras() {
    try {
        // Necesitamos permiso primero (algunos navegadores dan labels vacíos sin él)
        const tempStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        tempStream.getTracks().forEach(t => t.stop());
    } catch(e) { /* si falla, intentamos igual */ }

    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');

    // Detectar facing mode probando cada cámara brevemente
    availableCameras = [];
    for (let i = 0; i < videoDevices.length; i++) {
        const d = videoDevices[i];
        let facingMode = 'unknown';
        // Intentar obtener facingMode real del track
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: d.deviceId } } });
            const track = s.getVideoTracks()[0];
            const settings = track.getSettings();
            facingMode = settings.facingMode || 'unknown';
            s.getTracks().forEach(t => t.stop());
        } catch(e) {}

        const info = guessCameraInfo(d.label, i, facingMode);
        availableCameras.push({
            deviceId:   d.deviceId,
            label:      d.label || `Cámara ${i+1}`,
            facingMode,
            icon:       info.icon,
            name:       info.name
        });
    }

    // Seleccionar por defecto la primera cámara trasera (o la primera disponible)
    if (!selectedCameraId) {
        const rear = availableCameras.find(c => c.facingMode === 'environment');
        selectedCameraId = rear ? rear.deviceId : availableCameras[0]?.deviceId;
    }
}

// Renderiza los botones de selección de cámara
function renderCameraButtons() {
    cameraButtons.innerHTML = '';
    availableCameras.forEach(cam => {
        const btn = document.createElement('button');
        btn.className = `cam-btn ${cam.deviceId === selectedCameraId ? 'selected' : ''}`;
        btn.innerHTML = `
            <i class="fa-solid ${cam.icon} cam-icon"></i>
            <span class="cam-label">${cam.name}</span>
        `;
        btn.onclick = () => switchCamera(cam.deviceId);
        cameraButtons.appendChild(btn);
    });
}

// Cambia a la cámara indicada
async function switchCamera(deviceId) {
    if (deviceId === selectedCameraId && mediaStream) return;
    selectedCameraId = deviceId;
    renderCameraButtons();
    await startCamera(deviceId);
}

// Inicia (o reinicia) el stream con la cámara seleccionada
async function startCamera(deviceId) {
    setStatus('Cambiando cámara...', 'yellow');

    // Parar stream anterior
    if (mediaStream) {
        if (isFlashOn) {
            try { mediaStream.getVideoTracks()[0].applyConstraints({ advanced:[{torch:false}] }); } catch(e){}
            isFlashOn = false;
            flashIcon.className = 'fa-solid fa-bolt-slash';
        }
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
    }

    try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
            video: {
                deviceId: { exact: deviceId },
                width:  { ideal: 3840 },
                height: { ideal: 2160 }
            }
        });
        cameraFeed.srcObject = mediaStream;
        await new Promise(res => { cameraFeed.onloadedmetadata = res; });

        const track = mediaStream.getVideoTracks()[0];
        const caps  = track.getCapabilities();
        const sets  = track.getSettings();

        // Zoom nativo
        if (caps.zoom && caps.zoom.max > 1) {
            useNativeZoom = true;
            zoomSlider.min  = caps.zoom.min || 1;
            zoomSlider.max  = Math.min(caps.zoom.max, 4);
        } else {
            useNativeZoom = false;
            zoomSlider.min = 1;
            zoomSlider.max = 4;
        }
        currentZoom = 1;
        zoomSlider.value = 1;
        zoomLabel.innerText = 'Zoom: 1×';

        // Autofocus continuo
        if (caps.focusMode && caps.focusMode.includes('continuous')) {
            try { await track.applyConstraints({ advanced:[{focusMode:'continuous'}] }); } catch(e){}
        }

        const vw = sets.width  || cameraFeed.videoWidth;
        const vh = sets.height || cameraFeed.videoHeight;
        const camName = availableCameras.find(c=>c.deviceId===deviceId)?.name || 'Cámara';
        setStatus(`${camName} · ${vw}×${vh}`, 'green');
        setTimeout(() => setStatus('Acerca la figurita y pulsa la cámara','blue'), 2500);

    } catch(err) {
        console.error(err);
        setStatus('No se pudo abrir esta cámara.', 'red');
    }
}

async function openScanner() {
    scannerModal.classList.remove('hidden');
    scannerModal.classList.add('flex');
    previewContainer.classList.add('hidden');
    pendingCanvas = null;
    setStatus('Detectando cámaras...', 'blue');

    await enumerateCameras();
    renderCameraButtons();
    await startCamera(selectedCameraId);
}

function closeScanner() {
    if (isFlashOn) toggleFlash();
    if (mediaStream) { mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
    scannerModal.classList.add('hidden');
    scannerModal.classList.remove('flex');
    previewContainer.classList.add('hidden');
    pendingCanvas = null;
}

// Zoom slider
zoomSlider.addEventListener('input', async () => {
    currentZoom = parseFloat(zoomSlider.value);
    zoomLabel.innerText = `Zoom: ${currentZoom.toFixed(1)}×`;
    if (useNativeZoom && mediaStream) {
        try { await mediaStream.getVideoTracks()[0].applyConstraints({ advanced:[{zoom:currentZoom}] }); } catch(e){}
    }
});

// Linterna
async function toggleFlash() {
    if (!mediaStream) return;
    const track = mediaStream.getVideoTracks()[0];
    const caps  = track.getCapabilities();
    if (caps.torch) {
        isFlashOn = !isFlashOn;
        try {
            await track.applyConstraints({ advanced:[{torch:isFlashOn}] });
            flashIcon.className = isFlashOn ? 'fa-solid fa-bolt text-yellow-400' : 'fa-solid fa-bolt-slash';
        } catch(e) { console.error(e); }
    } else {
        setStatus('Flash no compatible en este dispositivo','orange');
        setTimeout(()=>setStatus('Acerca la figurita y pulsa la cámara','blue'),3000);
    }
}

// Enfoque táctil
cameraArea.addEventListener('click', async e => {
    if (!mediaStream || !previewContainer.classList.contains('hidden')) return;
    const rect = cameraArea.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;

    focusRing.style.left = `${x}px`;
    focusRing.style.top  = `${y}px`;
    focusRing.classList.remove('active');
    void focusRing.offsetWidth;
    focusRing.classList.add('active');
    setTimeout(()=>focusRing.classList.remove('active'),750);

    const track = mediaStream.getVideoTracks()[0];
    const caps  = track.getCapabilities();
    const px = x/rect.width, py = y/rect.height;
    try {
        if (caps.pointsOfInterest) {
            await track.applyConstraints({ advanced:[{pointsOfInterest:[{x:px,y:py}],focusMode:'manual'}] });
            setTimeout(async()=>{ try{ await track.applyConstraints({advanced:[{focusMode:'continuous'}]}); }catch(e){} },1500);
        } else if (caps.focusMode && caps.focusMode.includes('continuous')) {
            await track.applyConstraints({advanced:[{focusMode:'continuous'}]});
        }
    } catch(e) { console.warn('Focus:',e); }
});

// ─── Captura ──────────────────────────────────────────────────────────────────
function captureForPreview() {
    if (!mediaStream) return;
    const vw=cameraFeed.videoWidth, vh=cameraFeed.videoHeight;
    if (!vw||!vh){ setStatus('La cámara aún no está lista','orange'); return; }

    const dW=cameraArea.clientWidth, dH=cameraArea.clientHeight;
    const vAsp=vw/vh, dAsp=dW/dH;
    let rW,rH,oX=0,oY=0;
    if(vAsp>dAsp){ rH=dH;rW=dH*vAsp;oX=(rW-dW)/2; }
    else          { rW=dW;rH=dW/vAsp;oY=(rH-dH)/2; }
    const sX=vw/rW, sY=vh/rH;

    const gW=256,gH=320;
    let srcX=((dW-gW)/2+oX)*sX;
    let srcY=((dH-gH)/2+oY)*sY;
    let srcW=gW*sX, srcH=gH*sY;

    // Zoom digital si no hay zoom nativo
    if (!useNativeZoom && currentZoom>1) {
        const cx=srcX+srcW/2, cy=srcY+srcH/2;
        srcW/=currentZoom; srcH/=currentZoom;
        srcX=Math.max(0,Math.min(cx-srcW/2,vw-srcW));
        srcY=Math.max(0,Math.min(cy-srcH/2,vh-srcH));
    }

    const outW=Math.round(srcW*2), outH=Math.round(srcH*2);
    const canvas=document.createElement('canvas');
    canvas.width=outW; canvas.height=outH;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(cameraFeed,srcX,srcY,srcW,srcH,0,0,outW,outH);

    // Preprocesado: escala de grises + contraste
    const img=ctx.getImageData(0,0,outW,outH), d=img.data;
    for(let i=0;i<d.length;i+=4){
        const g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
        const c=clamp(((g/255-0.5)*1.6+0.5)*255);
        d[i]=d[i+1]=d[i+2]=c;
    }
    ctx.putImageData(img,0,0);

    pendingCanvas=canvas;
    previewImg.src=canvas.toDataURL('image/jpeg',0.92);
    previewContainer.classList.remove('hidden');
}

function clamp(v){ return Math.max(0,Math.min(255,Math.round(v))); }

window.retryCapture = () => {
    previewContainer.classList.add('hidden');
    pendingCanvas=null;
    setStatus('Acerca la figurita y pulsa la cámara','blue');
};
window.confirmScan = () => {
    if(!pendingCanvas) return;
    previewContainer.classList.add('hidden');
    runOCR(pendingCanvas);
    pendingCanvas=null;
};

async function runOCR(canvas) {
    captureBtn.disabled = true; 
    captureBtn.classList.add('opacity-50');
    setStatus('Analizando imagen...', 'yellow');
    
    try {
        const result = await Tesseract.recognize(canvas, 'spa', {
            logger: m => { 
                if(m.status === 'recognizing text') setStatus(`Leyendo: ${Math.round(m.progress * 100)}%`, 'yellow'); 
            },
            // Novedad: Obligamos a Tesseract a leer SOLO mayúsculas, números y guiones
            tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789- '
        });
        
        console.log("Texto crudo de Tesseract:", result.data.text);
        procesarTexto(result.data.text);
        
    } catch(e) { 
        console.error(e); 
        setStatus('Error al analizar la imagen.', 'red'); 
    }
    
    captureBtn.disabled = false; 
    captureBtn.classList.remove('opacity-50');
    setTimeout(closeScanner, 2500);
}

function procesarTexto(textoCrudo) {
    // 1. Limpieza inicial: Todo a mayúsculas para buscar los códigos
    let texto = textoCrudo.toUpperCase();

    // 2. Corrector de errores típicos de cámara
    // Cambia los ceros y cincos que lee mal al principio por letras, y luego fuerza números después del guion
    texto = texto.replace(/0/g, 'O').replace(/5/g, 'S').replace(/8/g, 'B'); 
    texto = texto.replace(/-O/g, '-0').replace(/-S/g, '-5').replace(/-B/g, '-8').replace(/-I/g, '-1');

    console.log("Texto procesado y corregido:", texto);

    let encontrado = false;

    // 3. Cazador de Patrones (Regex)
    // Busca 2 o 3 letras, un posible espacio o guion, y 1 o 2 números (Ej: ARG-10, FWC 1)
    const regexCodigo = /([A-Z]{2,3})[\s\-]*([0-9]{1,2})/g;
    const coincidencias = [...texto.matchAll(regexCodigo)];

    if (coincidencias.length > 0) {
        for (let match of coincidencias) {
            // Reconstruimos el código limpio (si leyó "ARG 10", lo arma como "ARG-10")
            let codigoExtraido = `${match[1]}-${match[2]}`;
            
            let cardIndex = albumData.findIndex(c => c.codigo === codigoExtraido);
            
            if (cardIndex !== -1) {
                const card = albumData[cardIndex];
                if (!card.enInventario) {
                    albumData[cardIndex].enInventario = true; 
                    saveData(); 
                    filterCards(); 
                    showToast(`¡Agregada! ${card.descripcion} (${card.codigo})`, true);
                } else {
                    showToast(`Ya tenías a ${card.descripcion} (${card.codigo})`, false);
                }
                setStatus(`¡Encontrado: ${card.codigo}!`, 'green');
                encontrado = true;
                break;
            }
        }
    }

    // 4. Fallback: Si no encontró el código por patrón, intentamos buscar el nombre
    if (!encontrado) {
        const textoNormalizado = quitarAcentos(textoCrudo).toLowerCase();
        const palabras = textoNormalizado.split(/\s+/).filter(p => p.length > 4);
        
        for (let card of albumData) {
            const desc = quitarAcentos(card.descripcion).toLowerCase();
            let coincidenciasDesc = palabras.filter(p => desc.includes(p)).length;
            
            if (coincidenciasDesc >= 2 || (coincidenciasDesc >= 1 && desc.split(' ').length === 1)) {
                if (!card.enInventario) {
                    card.enInventario = true; 
                    saveData(); 
                    filterCards();
                    showToast(`¡Agregada! ${card.descripcion} (${card.codigo})`, true);
                } else {
                    showToast(`Ya tenías a ${card.descripcion}`, false);
                }
                setStatus(`¡Encontrado: ${card.codigo}!`, 'green');
                encontrado = true;
                break;
            }
        }
    }

    if (!encontrado) {
        setStatus('No se reconoció el código.', 'orange');
        showToast('Apunta directamente al código (Ej: ARG-10)', false);
    }
}

function procesarTexto(texto) {
    const palabras=texto.split(/\s+/).filter(p=>p.length>2);
    for(let i=0;i<albumData.length;i++){
        const card=albumData[i];
        const cod=quitarAcentos(card.codigo), desc=quitarAcentos(card.descripcion);
        if(texto.includes(cod)||palabras.some(p=>desc.includes(p)&&p.length>4)){
            if(!card.enInventario){ card.enInventario=true; saveData(); filterCards(); showToast(`¡Agregada! ${card.descripcion} (${card.codigo})`,true); }
            else showToast(`Ya tenías a ${card.descripcion} (${card.codigo})`,false);
            setStatus(`¡Encontrado: ${card.codigo}!`,'green');
            return;
        }
    }
    setStatus('No se reconoció ninguna figurita.','orange');
    showToast('No se pudo identificar. Búscala manualmente.',false);
}

init();
