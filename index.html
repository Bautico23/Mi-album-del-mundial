<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Panini - Control de Figuritas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        /* Ocultar barra de desplazamiento general */
        ::-webkit-scrollbar { width: 6px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Ocultar barra de desplazamiento específica para los filtros horizontales */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-gray-800 pb-20">

    <header class="bg-blue-900 text-white sticky top-0 z-50 shadow-md">
        <div class="p-4 pb-2">
            <h1 class="text-xl font-bold text-center mb-3">Mi Álbum Panini</h1>
            
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                    <i class="fa-solid fa-search text-gray-400"></i>
                </span>
                <input type="text" id="searchInput" 
                    class="w-full py-2 pl-10 pr-4 rounded-lg text-black focus:outline-none focus:ring-2 focus:ring-blue-500" 
                    placeholder="Buscar por jugador (Ej: Messi) o código...">
            </div>
        </div>

        <div class="bg-blue-800 px-2 py-3 border-t border-blue-700">
            <div id="groupFilters" class="flex gap-2 overflow-x-auto hide-scrollbar px-2 snap-x">
                </div>
        </div>
    </header>

    <main class="p-4 max-w-2xl mx-auto">
        <div id="loadingSection" class="text-center py-10">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-600 mb-3"></i>
            <p class="text-gray-600">Cargando base de datos...</p>
        </div>

        <div id="statsSection" class="hidden grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-3 rounded-lg shadow-sm text-center">
                <p class="text-xs text-gray-500 uppercase font-bold">Completado</p>
                <p class="text-xl font-bold text-blue-600" id="progressCount">0 / 980</p>
            </div>
            <div class="bg-white p-3 rounded-lg shadow-sm text-center">
                <p class="text-xs text-gray-500 uppercase font-bold">Repetidas</p>
                <p class="text-xl font-bold text-orange-500" id="duplicatesCount">0</p>
            </div>
        </div>

        <div id="cardsContainer" class="grid gap-3"></div>
    </main>

    <script>
        const STORAGE_KEY = 'panini_album_data';
        let albumData = [];
        let uniqueGroups = [];
        let currentGroupFilter = 'Todos';

        const loadingSection = document.getElementById('loadingSection');
        const statsSection = document.getElementById('statsSection');
        const cardsContainer = document.getElementById('cardsContainer');
        const searchInput = document.getElementById('searchInput');
        const groupFiltersContainer = document.getElementById('groupFilters');

        // Función para eliminar acentos de un texto
        function quitarAcentos(texto) {
            if (!texto) return '';
            return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        // Inicializar aplicación
        async function init() {
            const storedData = localStorage.getItem(STORAGE_KEY);
            
            if (storedData) {
                albumData = JSON.parse(storedData);
                extractGroups();
                showApp();
            } else {
                try {
                    const response = await fetch('data.csv');
                    if (!response.ok) throw new Error('No se pudo encontrar el archivo data.csv');
                    const csvText = await response.text();
                    
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            albumData = results.data.map(row => ({
                                codigo: row['Código'],
                                pais: row['Categoría / Pais'],
                                descripcion: row['Descripción'],
                                enInventario: row['En Inventario'] === 'TRUE' || row['En Inventario'] === 'True' || false,
                                repetidas: parseInt(row['Repetidas']) || 0,
                                grupo: row['Grupos'] || 'Otros' // Por si algún campo viene vacío
                            }));

                            extractGroups();
                            saveData();
                            showApp();
                        }
                    });
                } catch (error) {
                    loadingSection.innerHTML = `
                        <i class="fa-solid fa-triangle-exclamation text-4xl text-red-500 mb-3"></i>
                        <p class="text-red-600 font-bold">Error al cargar data.csv</p>
                        <p class="text-sm text-gray-600 mt-2">Asegúrate de que estás usando un servidor local (Live Server) y que el archivo se llama exactamente "data.csv".</p>
                    `;
                    console.error(error);
                }
            }
        }

        // Extraer los grupos únicos para la barra de navegación
        function extractGroups() {
            const gruposSet = new Set(albumData.map(item => item.grupo));
            uniqueGroups = ['Todos', ...Array.from(gruposSet).filter(g => g)];
        }

        function showApp() {
            loadingSection.classList.add('hidden');
            statsSection.classList.remove('hidden');
            statsSection.classList.add('grid');
            renderGroupFilters();
            filterCards();
            updateStats();
        }

        // Renderizar los botones de grupos (píldoras)
        function renderGroupFilters() {
            groupFiltersContainer.innerHTML = '';
            
            uniqueGroups.forEach(grupo => {
                const btn = document.createElement('button');
                const isSelected = currentGroupFilter === grupo;
                
                // Clases del botón. Azul claro si está seleccionado, transparente si no.
                btn.className = `snap-start whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium transition-colors border-2 ${
                    isSelected 
                    ? 'bg-blue-100 text-blue-900 border-blue-200 shadow-sm' 
                    : 'bg-transparent text-blue-100 border-transparent hover:bg-blue-700'
                }`;
                btn.innerText = grupo;
                
                btn.onclick = () => {
                    currentGroupFilter = grupo;
                    renderGroupFilters(); // Re-renderizar para actualizar el color seleccionado
                    filterCards();        // Filtrar las tarjetas
                };
                
                groupFiltersContainer.appendChild(btn);
            });
        }

        // Función centralizada para filtrar por búsqueda Y grupo
        function filterCards() {
            const term = quitarAcentos(searchInput.value.toLowerCase());
            
            const filtered = albumData.filter(card => {
                // Filtro de Búsqueda
                const desc = quitarAcentos(card.descripcion ? card.descripcion.toLowerCase() : '');
                const cod = quitarAcentos(card.codigo ? card.codigo.toLowerCase() : '');
                const pais = quitarAcentos(card.pais ? card.pais.toLowerCase() : '');
                const matchesSearch = desc.includes(term) || cod.includes(term) || pais.includes(term);
                
                // Filtro de Grupo
                const matchesGroup = currentGroupFilter === 'Todos' || card.grupo === currentGroupFilter;

                return matchesSearch && matchesGroup;
            });
            
            renderCards(filtered);
        }

        // Escuchar cambios en el buscador
        searchInput.addEventListener('input', filterCards);

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(albumData));
            updateStats();
        }

        function updateStats() {
            const conseguidas = albumData.filter(c => c.enInventario).length;
            const repetidas = albumData.reduce((sum, c) => sum + c.repetidas, 0);
            document.getElementById('progressCount').innerText = `${conseguidas} / ${albumData.length}`;
            document.getElementById('duplicatesCount').innerText = repetidas;
        }

        function renderCards(dataToRender) {
            cardsContainer.innerHTML = '';
            
            // Límite de seguridad visual para celulares
            const displayData = dataToRender.slice(0, 100); 

            displayData.forEach((card) => {
                const realIndex = albumData.findIndex(c => c.codigo === card.codigo);

                const cardEl = document.createElement('div');
                cardEl.className = `p-4 rounded-lg border-2 shadow-sm flex items-center justify-between transition-colors ${card.enInventario ? 'bg-blue-50 border-blue-300' : 'bg-white border-gray-200'}`;
                
                cardEl.innerHTML = `
                    <div class="flex-1 cursor-pointer" onclick="toggleInventario(${realIndex})">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-lg ${card.enInventario ? 'text-blue-700' : 'text-gray-700'}">${card.codigo}</span>
                            <span class="text-xs px-2 py-1 bg-gray-200 text-gray-700 rounded-full">${card.pais}</span>
                        </div>
                        <p class="text-sm text-gray-600 mt-1 font-medium">${card.descripcion}</p>
                    </div>
                    
                    <div class="flex items-center gap-3 ml-2">
                        <button onclick="toggleInventario(${realIndex})" class="w-8 h-8 rounded-full flex items-center justify-center transition-colors ${card.enInventario ? 'bg-blue-500 text-white shadow-inner' : 'bg-gray-200 text-gray-400'}">
                            <i class="fa-solid fa-check"></i>
                        </button>
                        
                        <div class="flex items-center bg-gray-100 rounded-lg p-1 border border-gray-200">
                            <button onclick="updateRepetidas(${realIndex}, -1)" class="w-7 h-7 text-gray-600 hover:bg-gray-200 rounded flex items-center justify-center">
                                <i class="fa-solid fa-minus text-xs"></i>
                            </button>
                            <span class="w-6 text-center font-bold text-sm text-orange-600">${card.repetidas}</span>
                            <button onclick="updateRepetidas(${realIndex}, 1)" class="w-7 h-7 text-gray-600 hover:bg-gray-200 rounded flex items-center justify-center">
                                <i class="fa-solid fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
                cardsContainer.appendChild(cardEl);
            });

            if (dataToRender.length === 0) {
                cardsContainer.innerHTML = `<p class="text-center text-gray-500 py-6">No se encontraron resultados para "${currentGroupFilter}".</p>`;
            } else if (dataToRender.length > 100) {
                const notice = document.createElement('p');
                notice.className = 'text-center text-xs text-gray-400 mt-4';
                notice.innerText = `Se muestran 100 de ${dataToRender.length} resultados. Usa el buscador para filtrar más.`;
                cardsContainer.appendChild(notice);
            }
        }

        window.toggleInventario = function(index) {
            albumData[index].enInventario = !albumData[index].enInventario;
            
            // Si deja de estar disponible, vaciamos las repetidas
            if (!albumData[index].enInventario) {
                albumData[index].repetidas = 0;
            }
            saveData();
            filterCards(); 
        };

        window.updateRepetidas = function(index, change) {
            let newVal = albumData[index].repetidas + change;
            if (newVal < 0) newVal = 0;
            
            // Si se suman repetidas, se marca automáticamente como disponible
            if (newVal > 0 && !albumData[index].enInventario) {
                albumData[index].enInventario = true;
            }
            
            albumData[index].repetidas = newVal;
            saveData();
            filterCards();
        };

        init();
    </script>
</body>
</html>
